<audio id="sonido-agencia" src="alarma.mp3" preload="auto" loop></audio>

<style>
  /* ... (Mantenga todo su bloque CSS anterior sin cambios) ... */
  * { box-sizing: border-box; }
  html, body { background-color: #000000 !important; margin: 0; padding: 0; color: #b0b0b0; font-family: 'Courier New', Courier, monospace; min-height: 100vh; }
  @keyframes parpadeoAlerta { 0%, 100% { opacity: 1; text-shadow: 0 0 10px #ff0000; } 50% { opacity: 0.3; text-shadow: none; } }
  @keyframes revelarImagen { 0% { opacity: 0; transform: scale(0.9); filter: grayscale(100%) brightness(0); } 100% { opacity: 1; transform: scale(1); filter: grayscale(100%) brightness(0.8); } }
  @keyframes reestructurarInterfaz { 0% { max-width: 90%; margin: 40px auto; padding: 25px; background-color: #0a0a0a; border: 1px solid #333333; } 100% { max-width: 100%; margin: 0 0 20px 0; padding: 15px; background-color: #050505; border-bottom: 2px solid #aa0000; } }
  @keyframes destelloKeter { 0%, 100% { background-color: rgba(10, 0, 0, 0.95); } 50% { background-color: rgba(45, 0, 0, 1); box-shadow: 0 0 30px #ff0000; } }
  @keyframes interferenciaBrecha { 0% { opacity: 0.98; } 10% { opacity: 0.95; filter: hue-rotate(5deg); } 100% { opacity: 0.98; } }
  .alerta-parpadeante { animation: parpadeoAlerta 1s infinite; }
  .revelacion-activo { animation: revelarImagen 2s ease-out forwards; animation-delay: 1s; }
  .contenedor-introduccion { background-color: #0a0a0a; color: #dcdcdc; overflow: hidden; transition: all 1.5s ease-in-out; }
  .interfaz-reestructurada { animation: reestructurarInterfaz 1.5s ease-in-out forwards; }
  .bloqueo-critico { animation: destelloKeter 0.8s infinite; }
  .efecto-brecha-activa { animation: interferenciaBrecha 0.5s infinite; }
</style>

<div id="interfaz-global" style="background-color: #000000; min-height: 100vh; width: 100%; padding-bottom: 60px; float: left;">
  <!-- (Mantenga el cuerpo de su HTML igual: pantalla-introduccion, zona-restringida, etc.) -->
  <div id="pantalla-introduccion" class="contenedor-introduccion" style="text-align: center; margin: 0 auto; padding: 25px; border: 1px solid #333333; max-width: 90%;">
    <p class="alerta-parpadeante" style="color: #ff3333; font-weight: bold; font-size: 1.1em;">⚠️ ACCESO RESTRINGIDO ⚠️</p>
  </div>
  
  <div id="informacion-general" style="padding: 20px; max-width: 800px; margin: 20px auto;">
    <div id="zona-restringida" style="display: none;">
        <h3 id="titulo-archivo" style="color: #ff3333;">⚠️ [NEXUS NETWORK - ARCHIVO DE PERSONAL INTERNO] ⚠️</h3>
        <p id="texto-cuerpo">El Activo 0404 es incontrolable y representa un peligro de muerte inmediato...</p>
    </div>
  </div>
</div>

<div id="alerta-perimetro" class="bloqueo-critico" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; z-index: 10000;">
  <p>🛑 VIOLACIÓN DE PERÍMETRO INFORMATIVO 🛑</p>
</div>

<script>
  // Función de voz integrada
  function iniciarTransmisionVoz() {
    // Extrae el texto del archivo restringido
    const textoCompleto = document.getElementById('zona-restringida').innerText;
    const transmisión = new SpeechSynthesisUtterance(textoCompleto);
    transmisión.lang = 'es-AR';
    transmisión.rate = 0.9;
    transmisión.pitch = 0.8;
    window.speechSynthesis.speak(transmisión);
  }

  // Lógica original de scroll combinada con la voz
  let alertaDisparada = false;
  window.addEventListener('scroll', function() {
    if (window.scrollY > 20 && !alertaDisparada) {
      alertaDisparada = true;
      var panel = document.getElementById('alerta-perimetro');
      panel.style.display = 'block';

      setTimeout(() => {
        panel.style.display = 'none';
        document.getElementById('zona-restringida').style.display = 'block';
        
        // Disparar la voz automáticamente al revelar la información
        iniciarTransmisionVoz();
      }, 4000);
    }
  });

  // Mantenga aquí también su lógica de audio y DOMContentLoaded original
  window.addEventListener('load', () => {
    var audio = document.getElementById('sonido-agencia');
    document.addEventListener('click', () => audio.play().catch(e=>{}), { once: true });
  });
</script>
